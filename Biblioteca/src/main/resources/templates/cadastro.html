<!DOCTYPE html>
<html lang="pt-br" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Cadastro - Biblioteca UMC</title>
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>
        body {
            min-height: 100vh;
            background:
                radial-gradient(circle at top left, rgba(201, 162, 39, 0.15), transparent 28%),
                linear-gradient(135deg, #f8fafc 0%, #e2e8f0 100%);
            font-family: "Segoe UI", Arial, sans-serif;
        }
        .cadastro-card {
            border: 0;
            border-radius: 24px;
            box-shadow: 0 22px 48px rgba(15,23,42,0.12);
            overflow: hidden;
        }
        .cadastro-head {
            background: linear-gradient(90deg, #0f172a 0%, #1e3a5f 100%);
            color: #fff;
            padding: 28px 30px;
        }
        .cadastro-body {
            padding: 30px;
            background: #fff;
        }
        .form-label {
            font-weight: 600;
            color: #334155;
        }
        .form-control, .form-select {
            border-radius: 14px;
            padding: 12px 14px;
            border: 1px solid #cbd5e1;
        }
        .btn-main {
            background: linear-gradient(90deg, #1e3a5f 0%, #0f172a 100%);
            color: #fff;
            border: 0;
            border-radius: 14px;
            padding: 12px 18px;
            font-weight: 600;
        }
        .btn-main:hover {
            color: #fff;
        }
    </style>
</head>
<body>
<div class="container py-5">
    <div class="row justify-content-center align-items-center" style="min-height: 100vh;">
        <div class="col-lg-9">
            <div class="card cadastro-card">
                <div class="cadastro-head">
                    <h3 class="mb-1 fw-bold">Criar conta na Biblioteca UMC</h3>
                    <p class="mb-0 text-light opacity-75">Cadastro público disponível para aluno e professor.</p>
                </div>
                <div class="cadastro-body">
                    <div th:if="${erro != null}" class="alert alert-danger rounded-4" th:text="${erro}"></div>

                    <form th:action="@{/cadastro/salvar}" th:object="${usuario}" method="post">
                        <div class="row">
                            <div class="col-md-6 mb-3">
                                <label class="form-label">Nome</label>
                                <input type="text" th:field="*{nome}" class="form-control" required>
                            </div>

                            <div class="col-md-6 mb-3">
                                <label class="form-label">Matrícula</label>
                                <input type="text" th:field="*{matricula}" class="form-control" required>
                            </div>

                            <div class="col-md-8 mb-3">
                                <label class="form-label">Endereço ou CEP</label>
                                <input type="text" th:field="*{endereco}" class="form-control" required>
                            </div>

                            <div class="col-md-4 mb-3">
                                <label class="form-label">Tipo de Usuário</label>
                                <select th:field="*{tipoUsuario}" class="form-select" required>
                                    <option value="">Selecione</option>
                                    <option value="ALUNO">Aluno</option>
                                    <option value="PROFESSOR">Professor</option>
                                </select>
                            </div>

                            <div class="col-md-6 mb-3">
                                <label class="form-label">E-mail</label>
                                <input type="email" th:field="*{email}" class="form-control" required>
                            </div>

                            <div class="col-md-6 mb-3">
                                <label class="form-label">Telefone</label>
                                <input type="text" th:field="*{telefone}" class="form-control" required>
                            </div>

                            <div class="col-md-6 mb-3">
                                <label class="form-label">Login</label>
                                <input type="text" th:field="*{login}" class="form-control" required>
                            </div>

                            <div class="col-md-6 mb-4">
                                <label class="form-label">Senha</label>
                                <input type="password" th:field="*{senha}" class="form-control" required>
                            </div>
                        </div>

                        <button type="submit" class="btn btn-main w-100">Finalizar cadastro</button>
                    </form>

                    <div class="text-center mt-4">
                        <a th:href="@{/login}" class="fw-semibold">Já tenho conta</a>
                    </div>
                </div>
            </div>
        </div>
    </div>
</div>
</body>
</html>
